<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Enterprise Auth System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🔐 Welcome Back</h1>
            <p class="text-gray-600">Sign in to your account</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="your@email.com">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition pr-12"
                        placeholder="••••••••">
                    <button type="button" id="togglePassword" 
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                        👁️
                    </button>
                </div>
            </div>

            <!-- CAPTCHA -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">CAPTCHA</label>
                <div class="flex items-center gap-3 mb-3">
                    <div id="captchaImage" class="border border-gray-300 rounded-lg p-2 flex-1 bg-gray-50"></div>
                    <button type="button" id="refreshCaptcha"
                        class="px-4 py-3 bg-gray-200 hover:bg-gray-300 rounded-lg transition">
                        🔄
                    </button>
                </div>
                <input type="text" id="captchaText" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="Enter CAPTCHA">
                <input type="hidden" id="captchaId">
            </div>

            <!-- Error/Success Messages -->
            <div id="message" class="hidden p-4 rounded-lg"></div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                <span id="btnText">Sign In</span>
                <span id="btnLoader" class="hidden">⏳ Signing in...</span>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600">Don't have an account? 
                <a href="register.html" class="text-blue-600 hover:text-blue-700 font-semibold">Register</a>
            </p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>

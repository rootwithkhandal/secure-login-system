<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0xAuth // Enterprise Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Top Left Brand Logo (Reference UI Style) -->
    <header class="absolute top-0 left-0 w-full p-6 flex items-center justify-between z-20">
        <a href="login.html" class="flex items-center gap-3 group">
            <img src="/logo.svg" alt="SecureAuth Logo" class="w-10 h-10 rounded-xl object-contain shadow-[0_0_15px_rgba(79,195,247,0.2)] group-hover:scale-105 transition">
            <div>
                <span class="font-display text-lg text-white tracking-wider block leading-none">SECURE AUTH</span>
                <span class="font-label text-[10px] text-[#6b7a8d] tracking-widest block">ENTERPRISE ACCESS PORTAL</span>
            </div>
        </a>
        <div class="flex items-center gap-2">
            <span class="badge badge-bug">[0xAUTH v1.1]</span>
        </div>
    </header>

    <!-- Radar Concentric Rings Background (Reference UI Style) -->
    <div class="radar-bg">
        <div class="radar-ring ring-1"></div>
        <div class="radar-ring ring-2"></div>
        <div class="radar-ring ring-3"></div>
        <div class="radar-ring ring-4"></div>
    </div>

    <!-- Background Watermark -->
    <div class="bg-watermark">0xAUTH</div>

    <!-- Custom Cyber-Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- Centered Glassmorphic Auth Card (Reference UI Style) -->
    <main class="w-full max-w-md auth-card p-8 z-10 fade-in my-auto">
        <!-- Title & Subtitle -->
        <div class="text-center mb-6">
            <h1 class="font-display text-3xl text-white tracking-wide mb-1">OPERATOR SIGN IN</h1>
            <p class="text-xs font-label text-[#6b7a8d] tracking-widest leading-relaxed">
                ENTER CREDENTIALS TO ACCESS DEFENSIVE ARCHITECTURE & TELEMETRY
            </p>
        </div>

        <form id="loginForm" class="space-y-4">
            <!-- Email Input with Left Icon -->
            <div>
                <label class="block text-[11px] font-label text-[#4fc3f7] tracking-widest mb-1.5">OPERATOR EMAIL</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-[#6b7a8d]">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <input type="email" id="email" required
                        class="w-full pl-10 pr-4 py-3 bg-[#060c14]/80 border border-[#4fc3f7]/25 rounded-xl text-white placeholder-[#6b7a8d]/60 focus:border-[#4fc3f7] transition font-mono text-sm"
                        placeholder="user@example.com">
                </div>
            </div>

            <!-- Password Input with Left Icon & Toggle -->
            <div>
                <label class="block text-[11px] font-label text-[#4fc3f7] tracking-widest mb-1.5">ACCESS PASSKEY</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-[#6b7a8d]">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <input type="password" id="password" required
                        class="w-full pl-10 pr-12 py-3 bg-[#060c14]/80 border border-[#4fc3f7]/25 rounded-xl text-white placeholder-[#6b7a8d]/60 focus:border-[#4fc3f7] transition font-mono text-sm"
                        placeholder="••••••••••••">
                    <button type="button" id="togglePassword" title="Toggle Visibility"
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-[#6b7a8d] hover:text-[#4fc3f7] font-mono text-xs">
                        [SHOW]
                    </button>
                </div>
            </div>

            <!-- CAPTCHA Security Verification -->
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-[11px] font-label text-[#4fc3f7] tracking-widest">SECURITY CHALLENGE</label>
                    <button type="button" id="refreshCaptcha" title="Refresh Challenge" class="text-[11px] font-label text-[#6b7a8d] hover:text-[#4fc3f7] flex items-center gap-1">
                        <span>🔄</span> [REGEN]
                    </button>
                </div>
                <div class="flex items-center gap-2 mb-2">
                    <div id="captchaImage" class="border border-[#4fc3f7]/25 rounded-xl p-1.5 flex-1 bg-[#060c14] flex items-center justify-center min-h-[46px] overflow-hidden"></div>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-[#6b7a8d]">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <input type="text" id="captchaText" required
                        class="w-full pl-10 pr-4 py-3 bg-[#060c14]/80 border border-[#4fc3f7]/25 rounded-xl text-white placeholder-[#6b7a8d]/60 focus:border-[#4fc3f7] transition font-mono text-sm"
                        placeholder="ENTER CAPTCHA CODE">
                    <input type="hidden" id="captchaId">
                </div>
            </div>

            <!-- Encryption Status & Register Link -->
            <div class="flex justify-between items-center text-[11px] font-label tracking-wider pt-1">
                <span class="text-[#6b7a8d] flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-[#69f0ae] inline-block animate-pulse"></span> TLS 1.3 ENCRYPTED
                </span>
                <a href="register.html" class="text-[#4fc3f7] hover:underline font-bold">[PROVISION ACCOUNT →]</a>
            </div>

            <!-- Error/Success Messages -->
            <div id="message" class="hidden p-3 rounded-xl border font-label text-xs tracking-wider"></div>

            <!-- Prominent Submit Button (Reference UI Style) -->
            <button type="submit" id="submitBtn"
                class="btn-tactical w-full py-4 rounded-xl text-sm tracking-[0.2em] font-label font-bold uppercase shadow-[0_0_25px_rgba(79,195,247,0.3)] mt-2">
                <span id="btnText">INITIATE SESSION</span>
                <span id="btnLoader" class="hidden animate-pulse">⏳ VERIFYING...</span>
            </button>
        </form>

        <!-- Divider Line (Reference UI Style) -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-[#4fc3f7]/15"></div>
            </div>
            <div class="relative flex justify-center text-[10px] font-label tracking-widest uppercase">
                <span class="bg-[#0a1220] px-3 text-[#6b7a8d]">OR VERIFY VIA IDENTITY PROVIDER</span>
            </div>
        </div>

        <!-- Three Bottom Tactical Demo/Auth Buttons (Reference UI Style) -->
        <div class="grid grid-cols-3 gap-2.5">
            <button type="button" onclick="fillDemoUser('user')" class="py-2.5 px-3 bg-[#060c14]/80 hover:bg-[#4fc3f7]/10 border border-[#4fc3f7]/20 hover:border-[#4fc3f7] rounded-xl flex flex-col items-center justify-center transition group" title="Fill Standard User Demo">
                <span class="text-base mb-0.5 group-hover:scale-110 transition">👤</span>
                <span class="font-label text-[10px] text-[#6b7a8d] group-hover:text-[#4fc3f7] tracking-wider">DEMO USER</span>
            </button>
            <button type="button" onclick="fillDemoUser('admin')" class="py-2.5 px-3 bg-[#060c14]/80 hover:bg-[#ce93d8]/10 border border-[#ce93d8]/20 hover:border-[#ce93d8] rounded-xl flex flex-col items-center justify-center transition group" title="Fill Root Admin Demo">
                <span class="text-base mb-0.5 group-hover:scale-110 transition">👑</span>
                <span class="font-label text-[10px] text-[#6b7a8d] group-hover:text-[#ce93d8] tracking-wider">ROOT ADMIN</span>
            </button>
            <button type="button" onclick="alert('Hardware Key / WebAuthn token authentication simulated.')" class="py-2.5 px-3 bg-[#060c14]/80 hover:bg-[#69f0ae]/10 border border-[#69f0ae]/20 hover:border-[#69f0ae] rounded-xl flex flex-col items-center justify-center transition group" title="Hardware Token / YubiKey">
                <span class="text-base mb-0.5 group-hover:scale-110 transition">🔑</span>
                <span class="font-label text-[10px] text-[#6b7a8d] group-hover:text-[#69f0ae] tracking-wider">YUBIKEY</span>
            </button>
        </div>
    </main>

    <!-- Custom Cursor Script -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const dot = document.querySelector('.cursor-dot');
            const ring = document.querySelector('.cursor-ring');
            if (dot && ring) {
                dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                ring.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            }
        });
    </script>
    <script src="login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Enterprise Auth System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">👤 User Dashboard</h1>
            <p class="text-gray-600">Welcome to your account</p>
        </div>

        <!-- User Profile Card -->
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl p-6 text-white mb-6">
            <div class="flex items-center gap-4">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-4xl">
                    👤
                </div>
                <div>
                    <h2 id="userName" class="text-2xl font-bold"></h2>
                    <p id="userEmail" class="text-blue-100"></p>
                </div>
            </div>
        </div>

        <!-- Account Details -->
        <div class="space-y-4 mb-8">
            <div class="bg-gray-50 rounded-lg p-4">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm text-gray-600">Role</p>
                        <p id="userRole" class="text-lg font-semibold text-gray-800"></p>
                    </div>
                    <span class="text-2xl">🎭</span>
                </div>
            </div>

            <div class="bg-gray-50 rounded-lg p-4">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm text-gray-600">Account Created</p>
                        <p id="userCreated" class="text-lg font-semibold text-gray-800"></p>
                    </div>
                    <span class="text-2xl">📅</span>
                </div>
            </div>

            <div class="bg-gray-50 rounded-lg p-4">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm text-gray-600">Account Status</p>
                        <p class="text-lg font-semibold text-green-600">Active</p>
                    </div>
                    <span class="text-2xl">✅</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="space-y-3">
            <button id="logoutBtn"
                class="w-full bg-gradient-to-r from-red-500 to-red-600 text-white py-3 rounded-lg font-semibold hover:from-red-600 hover:to-red-700 transition transform hover:scale-105">
                🚪 Logout
            </button>
        </div>

        <!-- Info Box -->
        <div class="mt-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
            <p class="text-sm text-blue-800">
                <strong>ℹ️ Note:</strong> This is a user account. For administrative features, please contact your system administrator.
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            setupEventListeners();
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            
            // Display user info
            document.getElementById('userName').textContent = user.username || 'User';
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('userRole').textContent = user.role || 'User';
            
            // Format created date if available
            if (user.createdAt) {
                const date = new Date(user.createdAt);
                document.getElementById('userCreated').textContent = date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            } else {
                document.getElementById('userCreated').textContent = 'N/A';
            }
        }

        function setupEventListeners() {
            document.getElementById('logoutBtn').addEventListener('click', logout);
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>

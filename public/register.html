<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Enterprise Auth System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🚀 Create Account</h1>
            <p class="text-gray-600">Join our secure platform</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" id="username" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="johndoe">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="your@email.com">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition pr-12"
                        placeholder="••••••••">
                    <button type="button" id="togglePassword" 
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                        👁️
                    </button>
                </div>
                
                <!-- Password Strength -->
                <div class="mt-2">
                    <div class="flex gap-1 mb-2">
                        <div id="strength-bar-1" class="h-1 flex-1 bg-gray-200 rounded"></div>
                        <div id="strength-bar-2" class="h-1 flex-1 bg-gray-200 rounded"></div>
                        <div id="strength-bar-3" class="h-1 flex-1 bg-gray-200 rounded"></div>
                    </div>
                    <p id="strength-text" class="text-sm text-gray-600"></p>
                </div>

                <!-- Password Requirements -->
                <div class="mt-3 space-y-1 text-sm">
                    <div id="req-length" class="flex items-center gap-2 text-gray-600">
                        <span class="text-gray-400">○</span> At least 8 characters
                    </div>
                    <div id="req-uppercase" class="flex items-center gap-2 text-gray-600">
                        <span class="text-gray-400">○</span> One uppercase letter
                    </div>
                    <div id="req-lowercase" class="flex items-center gap-2 text-gray-600">
                        <span class="text-gray-400">○</span> One lowercase letter
                    </div>
                    <div id="req-number" class="flex items-center gap-2 text-gray-600">
                        <span class="text-gray-400">○</span> One number
                    </div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                <input type="password" id="confirmPassword" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="••••••••">
            </div>

            <!-- Role -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
                <select id="role" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    <option value="User">User</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <!-- Error/Success Messages -->
            <div id="message" class="hidden p-4 rounded-lg"></div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                <span id="btnText">Create Account</span>
                <span id="btnLoader" class="hidden">⏳ Creating...</span>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600">Already have an account? 
                <a href="login.html" class="text-blue-600 hover:text-blue-700 font-semibold">Sign In</a>
            </p>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
